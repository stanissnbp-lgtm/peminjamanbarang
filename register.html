<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | Misdinar Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 font-['Plus_Jakarta_Sans']">
    <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2 italic">Daftar Akun<span class="text-indigo-600">.</span></h1>
        <p class="text-slate-400 text-sm mb-8 font-medium italic uppercase tracking-widest text-[10px]">Buat akun dulu yaa</p>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email aktif..." class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition text-sm">
            <input type="password" id="pass" placeholder="Password (min 6 char)" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition text-sm">
            <button id="btnReg" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-extrabold shadow-lg hover:bg-indigo-700 transition active:scale-95">DAFTAR SEKARANG</button>
        </div>
        <p class="text-center text-xs text-slate-500 mt-8 font-medium">Udah punya akun? <a href="login.html" class="text-indigo-600 font-bold hover:underline italic">Login di sini</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnReg').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || pass.length < 6) return Swal.fire('Error', 'Email/Pass kaga valid!', 'error');

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), { email, role: "user" });
                Swal.fire('Berhasil!', 'Akun siap, otomatis masuk dashboard.', 'success').then(() => window.location.href = 'index.html');
            } catch (e) { Swal.fire('Gagal!', e.message, 'error'); }
        };
    </script>
</body>
</html>
