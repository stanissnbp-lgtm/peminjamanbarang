<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | Misdinar Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Daftar Akun</h2>
        <p class="text-slate-500 mb-8 text-sm">Silakan buat akun untuk mulai meminjam barang.</p>
        <div class="space-y-4">
            <input type="email" id="regEmail" placeholder="Email" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" id="regPass" placeholder="Password" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button id="btnReg" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Daftar Sekarang</button>
        </div>
        <p class="mt-6 text-center text-sm text-slate-500">Sudah punya akun? <a href="login.html" class="text-blue-600 font-bold">Login</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnReg').onclick = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // Simpan role default ke Firestore
                await setDoc(doc(db, "users", res.user.uid), {
                    email: email,
                    role: "user"
                });
                Swal.fire('Berhasil!', 'Akun dibuat, silakan login.', 'success').then(() => { window.location.href = 'login.html'; });
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };
    </script>
</body>
</html>
