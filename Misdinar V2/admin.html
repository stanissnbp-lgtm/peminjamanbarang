<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin | Misdinar Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .nav-active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .sidebar { background: #0f172a; transition: all 0.3s ease-in-out; z-index: 50; }
        .page-content { display: none; }
        #sidebarOverlay { display: none; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 40; }
        .table-container { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="sidebarOverlay" class="fixed inset-0 md:hidden" onclick="toggleSidebar()"></div>

    <div class="md:hidden flex items-center justify-between p-5 bg-white border-b border-slate-200 sticky top-0 z-30">
        <button onclick="toggleSidebar()" class="p-2 text-slate-600 focus:outline-none bg-slate-50 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter italic">Misdinar<span class="text-indigo-600">.</span>Admin</h1>
    </div>

    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-72 sidebar p-8 flex flex-col text-slate-400 transform -translate-x-full md:translate-x-0 md:relative">
        <div class="mb-12">
            <h1 class="text-2xl font-extrabold text-white tracking-tighter italic">Misdinar<span class="text-indigo-500">.</span>Admin</h1>
            <div class="inline-flex items-center gap-2 mt-4 px-3 py-1 bg-slate-800 rounded-lg border border-slate-700">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                <p id="roleBadge" class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Checking...</p>
            </div>
        </div>
        
        <nav class="flex flex-col gap-3 flex-1">
            <button onclick="navTo('stok')" id="btn-stok" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3 hover:text-white hover:bg-slate-800">
                <span>📦</span> Stok Barang
            </button>
            <button onclick="navTo('user')" id="btn-user" class="nav-btn hidden w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3 hover:text-white hover:bg-slate-800 text-indigo-400">
                <span>👥</span> Hak Akses User
            </button>
            <button onclick="navTo('history')" id="btn-history" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3 hover:text-white hover:bg-slate-800">
                <span>🕵️</span> Audit Stok
            </button>
            <button onclick="navTo('global')" id="btn-global" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3 hover:text-white hover:bg-slate-800">
                <span>📜</span> Log Global
            </button>
        </nav>

        <div class="mt-auto pt-8 border-t border-slate-800 flex flex-col gap-4">
            <a href="index.html" class="text-center text-xs font-bold text-indigo-400 hover:text-indigo-300 transition uppercase tracking-widest italic">← Peminjaman</a>
            <button id="btnLogout" class="w-full bg-slate-800 text-white py-4 rounded-2xl text-xs font-bold hover:bg-rose-900 transition">Logout Account</button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-16 overflow-y-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
            <h2 id="page-title" class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase italic">Dashboard</h2>
            <div class="text-left md:text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Logged as</p>
                <p id="adminEmail" class="text-sm font-bold text-slate-700 italic">Memuat email...</p>
            </div>
        </div>

        <section id="page-stok" class="page-content animate-in fade-in duration-500">
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] mb-10 shadow-xl shadow-indigo-100 flex flex-col md:flex-row gap-4">
                <input type="text" id="namaBarang" placeholder="Nama Barang..." class="flex-1 px-6 py-4 rounded-2xl border-none outline-none font-bold text-slate-800">
                <input type="number" id="stokBarang" placeholder="Qty" class="w-full md:w-32 px-6 py-4 rounded-2xl border-none outline-none font-bold text-center">
                <button id="btnAddItem" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-extrabold hover:bg-black transition shadow-lg">SIMPAN</button>
            </div>
            <div class="table-container p-6 overflow-x-auto"><table class="w-full text-left"><tbody id="inventoryBody" class="divide-y divide-slate-50"></tbody></table></div>
        </section>

        <section id="page-user" class="page-content animate-in fade-in"><div class="table-container p-6 overflow-x-auto"><table class="w-full text-left text-sm"><thead class="text-slate-400 uppercase text-[10px] border-b"><tr><th class="py-4 px-4">Email</th><th class="py-4 px-4">Role</th><th class="py-4 px-4 text-right">Ubah</th></tr></thead><tbody id="userTableBody" class="divide-y divide-slate-50"></tbody></table></div></section>
        <section id="page-history" class="page-content animate-in fade-in"><div class="table-container p-6 overflow-x-auto"><table class="w-full text-left text-[11px] uppercase tracking-tighter"><thead class="bg-slate-50 text-slate-400"><tr><th class="p-4">Waktu</th><th class="p-4">Pelaku</th><th class="p-4 text-center">Aksi</th><th class="p-4 text-center">Detail</th></tr></thead><tbody id="auditLogBody" class="divide-y divide-slate-50 font-bold text-slate-600"></tbody></table></div></section>
        <section id="page-global" class="page-content animate-in fade-in"><div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl overflow-x-auto"><table class="w-full text-[11px] text-left"><thead class="text-slate-500 border-b border-slate-800"><tr><th class="py-4 px-2">Waktu</th><th class="py-4 px-2">User</th><th class="py-4 px-2 text-center">Barang</th><th class="py-4 px-2 text-center">Status</th><th class="py-4 px-2">Bukti</th></tr></thead><tbody id="logBody" class="divide-y divide-slate-800"></tbody></table></div></section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, getDoc, query, orderBy, serverTimestamp, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let globalRole = "";
        let currentUserEmail = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserEmail = user.email;
                document.getElementById('adminEmail').innerText = user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    globalRole = userDoc.data().role;
                    document.getElementById('roleBadge').innerText = globalRole;
                    if (globalRole === 'admin') document.getElementById('btn-user').classList.remove('hidden');
                    if (globalRole === 'admin' || globalRole === 'perlengkapan') {
                        loadAllData();
                        navTo('stok'); 
                    } else { window.location.href = "index.html"; }
                }
            } else { window.location.href = "login.html"; }
        });

        // FUNGSI NAVIGASI FIX
        window.navTo = (id) => {
            if (id === 'user' && globalRole !== 'admin') return;
            
            // UI Switch
            document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            
            const targetPage = document.getElementById('page-' + id);
            if(targetPage) targetPage.style.display = 'block';
            
            const targetBtn = document.getElementById('btn-' + id);
            if(targetBtn) targetBtn.classList.add('nav-active');

            const titles = { stok: 'Stok Barang', user: 'Hak Akses User', history: 'Audit Log Stok', global: 'Peminjaman Global' };
            document.getElementById('page-title').innerText = titles[id];

            // Close sidebar on mobile after click
            if (window.innerWidth < 768) toggleSidebar();
        };

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('mainSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.style.display = sidebar.classList.contains('-translate-x-full') ? 'none' : 'block';
        };

        async function loadAllData() { loadInventory(); loadUsers(); loadAuditLogs(); loadLoanLogs(); }

        async function loadInventory() {
            const snap = await getDocs(collection(db, "inventory"));
            const body = document.getElementById('inventoryBody'); body.innerHTML = "";
            snap.forEach(d => { body.innerHTML += `<tr class="hover:bg-slate-50 transition"><td class="px-4 py-5 font-bold text-slate-800 italic uppercase text-sm">${d.data().nama}</td><td class="px-4 py-5 text-center text-indigo-600 font-extrabold text-lg">${d.data().stok}</td><td class="px-4 py-5 text-right"><button onclick="deleteItem('${d.id}', '${d.data().nama}')" class="text-rose-500 font-bold text-[10px] uppercase tracking-widest">Hapus</button></td></tr>`; });
        }

        document.getElementById('btnAddItem').onclick = async () => {
            const nama = document.getElementById('namaBarang').value;
            const stok = parseInt(document.getElementById('stokBarang').value);
            if(!nama || isNaN(stok)) return;
            await addDoc(collection(db, "inventory"), { nama, stok });
            await addDoc(collection(db, "logs_stok"), { waktu: serverTimestamp(), pelaku: currentUserEmail, aksi: "TAMBAH", detail: `${nama} (${stok})` });
            loadInventory(); loadAuditLogs();
        };

        window.deleteItem = async (id, nama) => {
            if((await Swal.fire({ title: 'Hapus?', text: `Yakin hapus ${nama}?`, icon: 'warning', showCancelButton: true })).isConfirmed) {
                await deleteDoc(doc(db, "inventory", id));
                await addDoc(collection(db, "logs_stok"), { waktu: serverTimestamp(), pelaku: currentUserEmail, aksi: "HAPUS", detail: nama });
                loadInventory(); loadAuditLogs();
            }
        };

        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            const body = document.getElementById('userTableBody'); body.innerHTML = "";
            snap.forEach(d => {
                const role = d.data().role || "user";
                body.innerHTML += `<tr><td class="px-4 py-5 font-bold text-slate-700">${d.data().email}</td><td><span class="px-3 py-1 rounded-lg text-[9px] font-bold uppercase ${role === 'admin' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-500'}">${role}</span></td><td class="text-right"><select onchange="updateRole('${d.id}', this.value)" class="text-[10px] border border-slate-200 rounded-lg p-2"><option value="">--</option><option value="user">User</option><option value="perlengkapan">Perlengkapan</option><option value="admin">Admin</option></select></td></tr>`;
            });
        }

        window.updateRole = async (id, role) => { if(!role) return; await updateDoc(doc(db, "users", id), { role }); loadUsers(); };

        async function loadAuditLogs() {
            const q = query(collection(db, "logs_stok"), orderBy("waktu", "desc"));
            const snap = await getDocs(q); const body = document.getElementById('auditLogBody'); body.innerHTML = "";
            snap.forEach(d => { body.innerHTML += `<tr><td class="p-4 font-normal italic text-slate-400 text-[10px]">${d.data().waktu?.toDate().toLocaleString() || '-'}</td><td class="p-4 text-slate-500">${d.data().pelaku}</td><td class="p-4 text-center ${d.data().aksi === 'TAMBAH' ? 'text-emerald-500' : 'text-rose-500'}">${d.data().aksi}</td><td class="p-4 italic text-slate-400 text-center">${d.data().detail}</td></tr>`; });
        }

        async function loadLoanLogs() {
            onSnapshot(query(collection(db, "loans"), orderBy("waktu_pinjam", "desc")), (snap) => {
                const body = document.getElementById('logBody'); body.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    body.innerHTML += `<tr><td class="py-4 px-2 text-slate-500 italic">${d.waktu_pinjam?.toDate().toLocaleString() || '-'}</td><td class="py-4 px-2 uppercase tracking-tighter">${d.peminjam.split('@')[0]}</td><td class="py-4 px-2 text-center font-bold">${d.barang} (x${d.jumlah})</td><td class="py-4 px-2 text-center uppercase tracking-widest text-[9px] ${d.status === 'kembali' ? 'text-emerald-400' : 'text-amber-400'}">${d.status}</td><td class="py-4 px-2">${d.foto_url ? `<a href="${d.foto_url}" target="_blank" class="text-indigo-400 font-bold hover:underline italic">[ FOTO ]</a>` : '-'}</td></tr>`;
                });
            });
        }

        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
