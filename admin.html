<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin | Misdinar Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .nav-active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .sidebar { background: #0f172a; transition: all 0.3s ease-in-out; z-index: 50; }
        .page-content { display: none; }
        #sidebarOverlay { display: none; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 40; }
        .table-container { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
    <div id="sidebarOverlay" class="fixed inset-0 md:hidden" onclick="toggleSidebar()"></div>

    <div class="md:hidden flex items-center justify-between p-5 bg-white border-b sticky top-0 z-30">
        <button onclick="toggleSidebar()" class="p-2 text-slate-600 bg-slate-50 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter italic">Misdinar<span class="text-indigo-600">.</span>Admin</h1>
    </div>

    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-72 sidebar p-8 flex flex-col text-slate-400 transform -translate-x-full md:translate-x-0 md:relative">
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-2xl font-extrabold text-white tracking-tighter italic">Misdinar<span class="text-indigo-500">.</span>Admin</h1>
            <p id="roleBadge" class="text-[9px] font-bold px-3 py-1 bg-slate-800 text-indigo-400 uppercase mt-2 inline-block rounded-lg tracking-widest">Checking...</p>
        </div>
        <nav class="flex flex-col gap-3 flex-1">
            <button onclick="navTo('stok')" id="btn-stok" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3">📦 Stok Barang</button>
            <button onclick="navTo('user')" id="btn-user" class="nav-btn hidden w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3">👥 Hak Akses User</button>
            <button onclick="navTo('history')" id="btn-history" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3">🕵️ Audit Stok</button>
            <button onclick="navTo('global')" id="btn-global" class="nav-btn w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition flex items-center gap-3">📜 Log Global</button>
        </nav>
        <div class="mt-auto pt-8 border-t border-slate-800 space-y-4">
            <a href="index.html" class="block text-center text-xs font-bold text-indigo-400 hover:underline uppercase italic">← Peminjaman</a>
            <button id="btnLogout" class="w-full bg-slate-800 text-white py-4 rounded-2xl text-xs font-bold hover:bg-rose-900">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-16 overflow-y-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <h2 id="page-title" class="text-3xl font-extrabold text-slate-900 italic tracking-tight uppercase">Dashboard</h2>
            <p id="adminEmail" class="text-sm font-bold text-slate-500 italic"></p>
        </div>

        <section id="page-stok" class="page-content">
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] mb-10 flex flex-col md:flex-row gap-4 shadow-xl shadow-indigo-50">
                <input type="text" id="namaBarang" placeholder="Nama Barang..." class="flex-1 px-6 py-4 rounded-2xl border-none outline-none font-bold">
                <input type="number" id="stokBarang" placeholder="Qty" class="w-full md:w-24 px-6 py-4 rounded-2xl text-center font-bold">
                <button id="btnAddItem" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-black">SIMPAN</button>
            </div>
            <div class="table-container p-6 overflow-x-auto"><table class="w-full text-left"><tbody id="inventoryBody" class="divide-y divide-slate-50"></tbody></table></div>
        </section>

        <section id="page-user" class="page-content"><div class="table-container p-6 overflow-x-auto"><table class="w-full text-left text-sm"><tbody id="userTableBody" class="divide-y divide-slate-50"></tbody></table></div></section>
        <section id="page-history" class="page-content"><div class="table-container p-6 overflow-x-auto"><table class="w-full text-[10px] uppercase tracking-tighter text-left"><tbody id="auditLogBody" class="divide-y divide-slate-50"></tbody></table></div></section>
        <section id="page-global" class="page-content"><div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl overflow-x-auto"><table class="w-full text-[10px] text-left"><tbody id="logBody" class="divide-y divide-slate-800"></tbody></table></div></section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, getDoc, query, orderBy, serverTimestamp, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* PASTE CONFIG LU DISINI */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let globalRole = "", currentUserEmail = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserEmail = user.email;
                document.getElementById('adminEmail').innerText = user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    globalRole = userDoc.data().role;
                    document.getElementById('roleBadge').innerText = globalRole;
                    if (globalRole === 'admin') document.getElementById('btn-user').classList.remove('hidden');
                    if (globalRole === 'admin' || globalRole === 'perlengkapan') { loadAllData(); navTo('stok'); } 
                    else { window.location.href = "index.html"; }
                }
            } else { window.location.href = "login.html"; }
        });

        window.navTo = (id) => {
            if (id === 'user' && globalRole !== 'admin') return;
            document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('page-' + id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('nav-active');
            const titles = { stok: 'Stok Barang', user: 'Hak Akses User', history: 'Audit Stok', global: 'Log Peminjaman' };
            document.getElementById('page-title').innerText = titles[id];
            if (window.innerWidth < 768) toggleSidebar();
        };

        window.toggleSidebar = () => {
            const sb = document.getElementById('mainSidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('-translate-x-full');
            ov.style.display = sb.classList.contains('-translate-x-full') ? 'none' : 'block';
        };

        async function loadAllData() { loadInventory(); loadUsers(); loadAuditLogs(); loadLoanLogs(); }
        async function loadInventory() {
            const snap = await getDocs(collection(db, "inventory"));
            const body = document.getElementById('inventoryBody'); body.innerHTML = "";
            snap.forEach(d => body.innerHTML += `<tr><td class="p-5 font-bold uppercase text-xs italic">${d.data().nama}</td><td class="p-5 text-center text-indigo-600 font-extrabold text-lg">${d.data().stok}</td><td class="p-5 text-right"><button onclick="deleteItem('${d.id}', '${d.data().nama}')" class="text-rose-500 font-bold text-[10px] uppercase tracking-widest">Hapus</button></td></tr>`);
        }
        document.getElementById('btnAddItem').onclick = async () => {
            const nama = document.getElementById('namaBarang').value;
            const stok = parseInt(document.getElementById('stokBarang').value);
            if(!nama || isNaN(stok)) return;
            await addDoc(collection(db, "inventory"), { nama, stok });
            await addDoc(collection(db, "logs_stok"), { waktu: serverTimestamp(), pelaku: currentUserEmail, aksi: "TAMBAH", detail: `${nama} (${stok})` });
            loadInventory(); loadAuditLogs();
        };
        window.deleteItem = async (id, nm) => {
            if((await Swal.fire({ title: 'Hapus?', text: nm, icon: 'warning', showCancelButton: true })).isConfirmed) {
                await deleteDoc(doc(db, "inventory", id));
                await addDoc(collection(db, "logs_stok"), { waktu: serverTimestamp(), pelaku: currentUserEmail, aksi: "HAPUS", detail: nm });
                loadInventory(); loadAuditLogs();
            }
        };
        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            const body = document.getElementById('userTableBody'); body.innerHTML = "";
            snap.forEach(d => {
                const r = d.data().role || "user";
                body.innerHTML += `<tr><td class="p-5 font-bold text-slate-700">${d.data().email}</td><td><span class="px-3 py-1 rounded-lg text-[9px] font-bold uppercase ${r === 'admin' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-500'}">${r}</span></td><td class="text-right"><select onchange="updateRole('${d.id}', this.value)" class="text-[10px] border p-2 rounded-lg"><option value="">--</option><option value="user">User</option><option value="perlengkapan">Perlengkapan</option><option value="admin">Admin</option></select></td></tr>`;
            });
        }
        window.updateRole = async (id, r) => { if(!r) return; await updateDoc(doc(db, "users", id), { role: r }); loadUsers(); };
        async function loadAuditLogs() {
            const q = query(collection(db, "logs_stok"), orderBy("waktu", "desc"));
            const snap = await getDocs(q); const body = document.getElementById('auditLogBody'); body.innerHTML = "";
            snap.forEach(d => body.innerHTML += `<tr><td class="p-4 italic text-slate-400">${d.data().waktu?.toDate().toLocaleString() || '-'}</td><td class="p-4 text-slate-500">${d.data().pelaku}</td><td class="p-4 text-center ${d.data().aksi === 'TAMBAH' ? 'text-emerald-500' : 'text-rose-500'}">${d.data().aksi}</td><td class="p-4 italic text-center">${d.data().detail}</td></tr>`);
        }
        async function loadLoanLogs() {
            onSnapshot(query(collection(db, "loans"), orderBy("waktu_pinjam", "desc")), (snap) => {
                const body = document.getElementById('logBody'); body.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    body.innerHTML += `<tr><td class="py-4 px-2 text-slate-500 italic">${d.waktu_pinjam?.toDate().toLocaleString() || '-'}</td><td class="py-4 px-2 uppercase tracking-tighter font-bold text-slate-400">${d.peminjam.split('@')[0]}</td><td class="py-4 px-2 text-center font-bold">${d.barang} (x${d.jumlah})</td><td class="py-4 px-2 text-center uppercase tracking-widest ${d.status === 'kembali' ? 'text-emerald-400' : 'text-amber-400'}">${d.status}</td><td class="py-4 px-2">${d.foto_url ? `<a href="${d.foto_url}" target="_blank" class="text-indigo-400 font-bold hover:underline italic">[ FOTO ]</a>` : '-'}</td></tr>`;
                });
            });
        }
        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
