<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Misdinar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #34495e; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login Inventaris</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="btnLogin">MASUK</button>
        <p style="font-size:12px">Gunakan akun yang sudah didaftarkan.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };

        const auth = getAuth(initializeApp(firebaseConfig));

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (err) { alert("Login Gagal: " + err.message); }
        };
    </script>
</body>
</html>
