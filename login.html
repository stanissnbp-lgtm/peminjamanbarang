<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Misdinar Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 font-['Plus_Jakarta_Sans']">
    <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2 italic tracking-tighter">Login<span class="text-indigo-600">.</span></h1>
        <p class="text-slate-400 text-sm mb-8 font-medium italic uppercase tracking-widest text-[10px]">Selamat datang kembali.</p>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email lu..." class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition text-sm">
            <input type="password" id="pass" placeholder="Password..." class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold transition text-sm">
            <button id="btnLogin" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-extrabold shadow-lg hover:bg-black transition active:scale-95">MASUK SEKARANG</button>
        </div>
        <p class="text-center text-xs text-slate-500 mt-8 font-medium">Belum punya akun? <a href="register.html" class="text-indigo-600 font-bold hover:underline italic">Daftar dulu</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'index.html';
            } catch (e) { Swal.fire('Gagal!', 'Email atau password salah, jing!', 'error'); }
        };
    </script>
</body>
</html>
