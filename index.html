<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misdinar Inventory | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }</style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 italic tracking-tighter">Misdinar<span class="text-indigo-600">.</span></h1>
                <p id="userEmailDisplay" class="text-[11px] font-bold text-slate-400 mt-1 uppercase tracking-widest italic">MEMUAT PROFIL...</p>
            </div>
            <div class="flex gap-3">
                <a href="admin.html" id="adminBtn" class="hidden bg-white border px-5 py-3 rounded-2xl text-slate-700 font-bold text-xs flex items-center gap-2 hover:bg-slate-50 transition shadow-sm">⚡ Panel Kontrol</a>
                <button id="btnLogout" class="bg-rose-50 text-rose-600 px-5 py-3 rounded-2xl font-bold text-xs hover:bg-rose-100 transition">Keluar</button>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] p-8 mb-10 shadow-xl shadow-slate-200/50 border border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 italic">🛒 Keranjang Pinjaman</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <select id="barangSelect" class="flex-1 px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition text-sm"></select>
                <input type="number" id="jumlahInput" value="1" min="1" class="w-full md:w-24 px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none text-center font-bold">
                <button id="btnTambahKeranjang" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-slate-800 active:scale-95 transition">TAMBAHKAN</button>
            </div>
            <div id="cartItems" class="my-6 space-y-3 py-4 border-y border-slate-50"><p class="text-center text-slate-400 text-xs italic uppercase">Keranjang kosong.</p></div>
            <button id="btnCheckout" class="hidden w-full bg-indigo-600 text-white py-5 rounded-2xl font-extrabold shadow-lg hover:bg-indigo-700 tracking-widest text-sm transition uppercase">Kirim Peminjaman</button>
        </div>

        <h2 class="text-2xl font-extrabold text-slate-800 mb-6 italic px-2 tracking-tight">Riwayat Pinjaman Saya</h2>
        <div id="loanList" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, getDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFX7SWWK8z0cQD3m4KNKjW3VCMbEjA_Tg",
            authDomain: "testing-6b1d1.firebaseapp.com",
            projectId: "testing-6b1d1",
            storageBucket: "testing-6b1d1.firebasestorage.app",
            messagingSenderId: "301829936342",
            appId: "1:301829936342:web:4584de1f4740d4c978e577"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserEmail = "";
        let cart = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; } else {
                currentUserEmail = user.email;
                document.getElementById('userEmailDisplay').innerText = "👤 " + user.email;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && (userDoc.data().role === 'admin' || userDoc.data().role === 'perlengkapan')) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                }
                loadInventory(); initLoansRealtime();
            }
        });

        async function loadInventory() {
            const snap = await getDocs(collection(db, "inventory"));
            const select = document.getElementById('barangSelect');
            select.innerHTML = '<option value="">Pilih Barang...</option>';
            snap.forEach(d => select.innerHTML += `<option value="${d.data().nama}" data-stok="${d.data().stok}">${d.data().nama} (Sisa: ${d.data().stok})</option>`);
        }

        document.getElementById('btnTambahKeranjang').onclick = () => {
            const select = document.getElementById('barangSelect');
            const barang = select.value;
            const jumlah = parseInt(document.getElementById('jumlahInput').value);
            const stokTersedia = parseInt(select.options[select.selectedIndex]?.getAttribute('data-stok') || 0);
            if(!barang || jumlah <= 0 || jumlah > stokTersedia) return Swal.fire('Error', 'Cek stok, jing!', 'error');
            cart.push({ barang, jumlah }); renderCart();
        };

        function renderCart() {
            const container = document.getElementById('cartItems');
            const btn = document.getElementById('btnCheckout');
            container.innerHTML = cart.length === 0 ? '<p class="text-center text-slate-400 text-xs italic">Keranjang kosong.</p>' : '';
            cart.forEach((item, index) => {
                container.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100"><span class="font-bold text-slate-700 text-sm">${item.barang} <span class="text-indigo-600">x${item.jumlah}</span></span><button onclick="removeItem(${index})" class="text-rose-500 font-bold text-[10px] uppercase tracking-widest hover:underline">Batal</button></div>`;
            });
            cart.length > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }
        window.removeItem = (i) => { cart.splice(i, 1); renderCart(); };

        document.getElementById('btnCheckout').onclick = async () => {
            Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
            try {
                for (const item of cart) {
                    const q = query(collection(db, "inventory"), where("nama", "==", item.barang));
                    const snapInv = await getDocs(q);
                    const invDoc = snapInv.docs[0];
                    await updateDoc(invDoc.ref, { stok: invDoc.data().stok - item.jumlah });
                    await addDoc(collection(db, "loans"), { peminjam: currentUserEmail, barang: item.barang, jumlah: item.jumlah, status: "dipinjam", waktu_pinjam: serverTimestamp(), laporan: "", foto_url: "" });
                }
                cart = []; renderCart(); loadInventory(); Swal.fire('Berhasil!', 'Pinjaman dikirim.', 'success');
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
        };

        function initLoansRealtime() {
            onSnapshot(query(collection(db, "loans"), orderBy("waktu_pinjam", "desc")), (snap) => {
                const list = document.getElementById('loanList'); list.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if(d.peminjam === currentUserEmail) {
                        const isDipinjam = d.status === "dipinjam";
                        list.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex justify-between items-center"><div><h3 class="font-bold text-slate-800 text-sm italic uppercase">${d.barang} (x${d.jumlah})</h3><p class="text-[9px] font-extrabold uppercase tracking-widest mt-1 ${isDipinjam ? 'text-amber-500' : 'text-emerald-500'}">${d.status}</p></div>${isDipinjam ? `<button onclick="kembalikanBarang('${docSnap.id}', '${d.barang}', ${d.jumlah})" class="bg-slate-900 text-white text-[10px] px-4 py-2 rounded-xl font-bold uppercase hover:bg-indigo-600 transition">Kembalikan</button>` : '✅'}</div>`;
                    }
                });
            });
        }

        window.kembalikanBarang = async (id, nama, jumlah) => {
            const { value: form } = await Swal.fire({
                title: `Kembalikan ${nama}`,
                html: `<div class="text-left space-y-2"><label class="text-[10px] font-bold text-slate-400 uppercase">Link Foto Bukti (WAJIB)</label><input id="swal-foto" class="swal2-input" placeholder="https://..."><label class="text-[10px] font-bold text-slate-400 uppercase block mt-3">Laporan</label><input id="swal-lap" class="swal2-input" placeholder="Ok/Rusak..."></div>`,
                preConfirm: () => {
                    const foto = document.getElementById('swal-foto').value.trim();
                    if (!foto) { Swal.showValidationMessage('Wajib foto!'); return false; }
                    return { foto, lap: document.getElementById('swal-lap').value.trim() };
                }
            });
            if (form) {
                await updateDoc(doc(db, "loans", id), { status: "kembali", laporan: form.lap || "Ok", foto_url: form.foto, waktu_kembali: serverTimestamp() });
                const qInv = query(collection(db, "inventory"), where("nama", "==", nama));
                const snapInv = await getDocs(qInv);
                if (!snapInv.empty) await updateDoc(snapInv.docs[0].ref, { stok: snapInv.docs[0].data().stok + jumlah });
                loadInventory(); Swal.fire('Selesai!', 'Barang balik.', 'success');
            }
        };
        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
